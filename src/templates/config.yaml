# 项目内主要路径。
# 若项目结构特殊，可按实际情况调整这些值。
paths:
  # 主要源码目录。
  src: {{paths.src}}
  # 需求文档路径。
  requirementDoc: {{paths.requirementDoc}}
  # 执行计划文档路径。
  planDoc: {{paths.planDoc}}
  # 任务进度文件路径。
  progressFile: {{paths.progressFile}}

# 质量门命令。
# 留空表示当前项目未启用该检查项。
gates:
  # 代码检查命令。
  lint: {{gates.lint}}
  # 构建命令。
  build: {{gates.build}}
  # 类型检查命令。
  type: {{gates.type}}
  # 测试命令。
  test: {{gates.test}}
