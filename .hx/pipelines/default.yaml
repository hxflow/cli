# Project-level default pipeline.
# Copy from framework default and adjust step order only when the team
# really needs a different main path.

name: 全自动流水线（主路径）

steps:
  - id: doc
    phase: Phase 01
    name: 需求文档
    command: hx-doc
    checkpoint:
      message: 基于生成的需求文档 summary 评审完整性与可执行性；通过后继续，需修改则返回明确修正意见

  - id: plan
    phase: Phase 02
    name: 执行计划
    command: hx-plan
    checkpoint:
      message: 基于任务拆分 summary 评审边界、验收标准与调度元数据；通过后继续，需修改则返回明确修正意见

  - id: run
    phase: Phase 04
    name: 执行需求
    command: hx-run

  - id: check
    phase: Phase 06
    name: 核心检查
    command: hx-check

  - id: mr
    phase: Phase 08
    name: MR 描述
    command: hx-mr
