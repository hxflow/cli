name: Agent Evals

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨 2 点
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write  # 写入 history.json 需要

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate datasets
        run: npm run hx:evals:validate

      - name: Run agent evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm run hx:evals:run:record -- \
            --run-out /tmp/hx-eval-run.json \
            --summary /tmp/evals-summary.md

      - name: Commit history update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hxflow/evals/runs/history.json
          git diff --cached --quiet || git commit -m "chore: update eval history [skip ci]"
          git push

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: |
            /tmp/hx-eval-run.json
            /tmp/evals-summary.md
